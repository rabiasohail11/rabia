<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard</title>
    <script src="https://kit.fontawesome.com/c2b8d2c723.js" crossorigin="anonymous"></script>
     <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="side-menu">
        <div class="brand-name"> <h1>Marke</h1>
        </div>
        <ul>
            <li><i class="fa-solid fa-chart-column"></i>&nbsp;  Dashboard</li>
            <li><i class="fa-solid fa-user-graduate"></i>&nbsp;  Schüler</li>
            <li><i class="fa-solid fa-person-chalkboard"></i>&nbsp;  Lehrer</li>
            <li><i class="fa-solid fa-school"></i>&nbsp;  Schulen</li>
            <li><i class="fa-solid fa-hand-holding-dollar"></i>&nbsp;  Einnahmen</li>
            <li><i class="fa-solid fa-circle-question"></i>&nbsp;  Hilfe</li>
            <li><i class="fa-solid fa-gear"></i>&nbsp;  Einstellungen</li>
        </ul>
    </div>
    <div class="container">
        <div class="header">
            <div class="nav">
                <div class="search">
               <input type="text" placeholder="Search..">
               <button type="submit"><img src="search.png" alt=""></i></button>
                </div>

                <div class="user">
                    <a href="#" class="btn">Neu hinzufügen</a>
                    <img src="notifications.png" alt="">
                    <div class="userperson">
                        <img src="user.png" alt="">
                    </div>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="cards">
                <div class="card">
                    <div class="box">
                        <h1>30567</h1>
                       <h3>Schüler</h3>
                    </div>
                    <div class="icon_case">
                        <img src="stu.png" alt="" height="100px">
                    </div>
                </div>


                 <div class="card">
                    <div class="box">
                        <h1>800</h1>
                       <h3>Lehrer</h3>
                    </div>
                    <div class="icon_case">
                        <img src="teacher.jpg" alt="" height="100px">
                    </div>
                </div>


                 <div class="card">
                    <div class="box">
                        <h1>16</h1>
                       <h3>Schulen</h3>
                    </div>
                    <div class="icon_case">
                        <img src="sss.png" alt="" height="130px">
                    </div>
                </div>


                 <div class="card">
                    <div class="box">
                        <h1>7500000</h1>
                       <h3>Einnahmen</h3>
                    </div>
                    <div class="icon_case">
                     <img src="incomess.png" alt="" height="130px">
                    </div>
                </div>
            </div>
            <div class="content-2"></div>
        </div>
    </div>
</body>
</html>
